<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Pour Puzzle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <div class="stats">
                <span>Level: <span id="level-indicator">1</span>/100</span>
                <span>Moves: <span id="move-counter">0</span></span>
            </div>
            <button class="btn btn-hint" onclick="giveHint()">Hint 💡</button>
        </header>

        <div id="tubes-section" class="tubes-grid">
            <!-- Tubes will be dynamically generated here by JS -->
        </div>

        <div class="game-controls">
            <button class="btn" onclick="undoMove()">↩️ Undo</button>
            <button class="btn" onclick="restartLevel()">🔄 Restart</button>
            <button class="btn" onclick="nextLevel()">Next Level ➡️</button>
        </div>
        <div class="save-msg" id="save-status">Progress Saved! ✅</div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
